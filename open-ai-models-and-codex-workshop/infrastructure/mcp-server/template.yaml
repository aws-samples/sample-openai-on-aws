AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Workshop MCP Server - Deploys a Lambda function that implements an MCP server
  with a SQLite database for the Remote MCP module.

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package
  S3Key:
    Type: String
    Description: S3 key for the Lambda deployment zip
    Default: mcp-server.zip

Resources:
  McpServerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-mcp-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  McpServerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-mcp-server'
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Role: !GetAtt McpServerRole.Arn
      Timeout: 30
      MemorySize: 256

  McpServerFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt McpServerFunction.Arn

  McpServerFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref McpServerFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  McpServerBedrockPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref McpServerFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com

Outputs:
  McpServerUrl:
    Description: Function URL for the MCP server (use as MCP_SERVER_URL)
    Value: !GetAtt McpServerFunctionUrl.FunctionUrl
    Export:
      Name: !Sub '${AWS::StackName}-McpServerUrl'

  McpServerFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt McpServerFunction.Arn
