AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenTelemetry Collector on ECS Fargate for Codex metrics - supports both VPC creation and existing VPC'

Parameters:
  VpcId:
    Type: String
    Description: VPC ID where the collector will be deployed

  SubnetIds:
    Type: CommaDelimitedList
    Description: Subnet IDs for the collector (at least 2 for ALB)

  CollectorImage:
    Type: String
    Default: public.ecr.aws/aws-observability/aws-otel-collector:latest
    Description: ADOT Collector container image

  MetricsNamespace:
    Type: String
    Default: LiteLLMGateway
    Description: CloudWatch metrics namespace

  CustomDomainName:
    Type: String
    AllowedPattern: '.+'
    ConstraintDescription: Custom domain name is required for HTTPS.
    Description: Custom domain name for HTTPS (e.g., telemetry.company.com)

  HostedZoneId:
    Type: String
    AllowedPattern: '.+'
    ConstraintDescription: Route53 hosted zone ID is required for certificate validation.
    Description: Route53 hosted zone ID for the custom domain

  OidcIssuerUrl:
    Type: String
    Default: ''
    Description: OIDC issuer URL for ALB JWT validation

  OidcJwksEndpoint:
    Type: String
    Default: ''
    Description: JWKS endpoint URL for ALB JWT signature validation

  OidcClientId:
    Type: String
    Default: ''
    Description: OIDC client ID for ALB JWT audience (aud) claim validation

  EnableAnalytics:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable dual-export (OTLP + EMF) for analytics pipeline. When false, only OTLP export is used.

Conditions:
  HasJwtAuth: !Not [!Equals [!Ref OidcIssuerUrl, '']]
  HasOidcClientId: !Not [!Equals [!Ref OidcClientId, '']]
  AnalyticsEnabled: !Equals [!Ref EnableAnalytics, 'true']

# Rules section removed - validation handled by deployment script

Resources:
  OTelKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} OTel collector logs key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.${AWS::URLSuffix}'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: '*'
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'

  OTelKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-otel'
      TargetKeyId: !Ref OTelKmsKey

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  # CloudWatch Log Groups
  CollectorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}-collector"
      KmsKeyId: !GetAtt OTelKmsKey.Arn
      RetentionInDays: 7

  MetricsLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: AnalyticsEnabled
    Properties:
      LogGroupName: !Sub "/aws/${AWS::StackName}/metrics"
      KmsKeyId: !GetAtt OTelKmsKey.Arn
      RetentionInDays: 30
      Tags:
        - Key: Purpose
          Value: Codex Usage Metrics
        - Key: Stack
          Value: !Ref AWS::StackName

  # Security Groups
  # Security Groups
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_260
            comment: Internet-facing OTEL collector ALB requires HTTPS ingress from 0.0.0.0/0; collectors authenticate via mutual TLS or network controls.
      cfn-lint:
        ignore_checks:
          - EA022
        ignore_reasons:
          EA022: Internet-facing OTEL collector ALB intentionally allows HTTPS from 0.0.0.0/0; access is restricted to port 443 only.
      cfn_nag:
        rules_to_suppress:
          - id: W2
            reason: Internet-facing OTEL collector ALB requires HTTPS ingress from 0.0.0.0/0.
          - id: W9
            reason: Internet-facing OTEL collector ALB requires HTTPS ingress from 0.0.0.0/0.
      guard:
        SuppressedRules:
          - EC2_SECURITY_GROUP_INGRESS_OPEN_TO_WORLD_RULE: "Internet-facing ALB intentionally accepts HTTPS from 0.0.0.0/0; network access is controlled by VPC placement and HTTPS-only rule."
    Properties:
      GroupDescription: Security group for OTEL Collector ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS access from anywhere
      Tags:
        - Key: Name
          Value: otel-collector-alb-sg

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W5
            reason: OTEL collector tasks require HTTPS egress to AWS APIs (CloudWatch, DynamoDB).
      guard:
        SuppressedRules:
          - EC2_SECURITY_GROUP_EGRESS_OPEN_TO_WORLD_RULE: "OTEL collector tasks require HTTPS egress to AWS APIs; restricted to port 443 only."
    Properties:
      GroupDescription: Security group for OTEL Collector tasks
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to CloudWatch and DynamoDB (AWS APIs)
      Tags:
        - Key: Name
          Value: otel-collector-task-sg

  # Egress rule for ALB to Task communication (separate to avoid circular dependency)
  ALBToTaskEgressRule:
    Type: AWS::EC2::SecurityGroupEgress
    Metadata:
      guard:
        SuppressedRules:
          - SECURITY_GROUP_EGRESS_PORT_RANGE_RULE: "OTLP uses ports 4317 (gRPC) and 4318 (HTTP); this two-port range is the standard OTLP receiver range and cannot be collapsed to a single port."
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 4317
      ToPort: 4318
      DestinationSecurityGroupId: !Ref TaskSecurityGroup
      Description: OTLP traffic to collector tasks

  # Ingress rule for Task from ALB (separate to avoid circular dependency)
  TaskFromALBIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Metadata:
      guard:
        SuppressedRules:
          - SECURITY_GROUP_INGRESS_PORT_RANGE_RULE: "OTLP uses ports 4317 (gRPC) and 4318 (HTTP); this two-port range is the standard OTLP receiver range and cannot be collapsed to a single port."
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: 4317
      ToPort: 4318
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: OTLP ports from ALB

  # ACM Certificate (created automatically when domain is provided)
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref CustomDomainName
      DomainValidationOptions:
        - DomainName: !Ref CustomDomainName
          HostedZoneId: !Ref HostedZoneId
      ValidationMethod: DNS
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-certificate'

  # Route53 Record for custom domain
  DNSRecord:
    Type: AWS::Route53::RecordSet
    DependsOn: Certificate
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt LoadBalancer.DNSName
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  # Application Load Balancer
  ALBLogsBucket:
    Type: AWS::S3::Bucket
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: This bucket is the ALB access-log destination; recursive server access logging is intentionally not enabled.
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: This bucket is the ALB access-log destination; recursive server access logging is intentionally not enabled.
      guard:
        SuppressedRules:
          - S3_BUCKET_NO_PUBLIC_RW_ACL: "AccessControl is explicitly set to Private; cfn-guard false positive triggered by missing property check."
    Properties:
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteALBAccessLogs
            Status: Enabled
            ExpirationInDays: 90
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: 1

  ALBLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowALBLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt ALBLogsBucket.Arn
          - Sid: AllowALBLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${ALBLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ALBLogsBucket.Arn
              - !Sub "${ALBLogsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: ALBLogsBucketPolicy
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Type: application
      IpAddressType: ipv4
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetIds
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - Key: access_logs.s3.enabled
          Value: "true"
        - Key: access_logs.s3.bucket
          Value: !Ref ALBLogsBucket
        - Key: access_logs.s3.prefix
          Value: "alb"
      Tags:
        - Key: Name
          Value: otel-collector-alb
        - Key: Purpose
          Value: HTTPS-enabled OTEL collector for Codex

  # Target Group
  HTTPTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-tg'
      Port: 4318
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200,404'

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions: !If
        - HasJwtAuth
        - - Type: jwt-validation
            Order: 1
            JwtValidationConfig:
              Issuer: !Ref OidcIssuerUrl
              JwksEndpoint: !Ref OidcJwksEndpoint
              AdditionalClaims: !If
                - HasOidcClientId
                - - Name: aud
                    Format: string-array
                    Values:
                      - !Ref OidcClientId
                - !Ref AWS::NoValue
          - Type: forward
            Order: 2
            TargetGroupArn: !Ref HTTPTargetGroup
        - - Type: forward
            TargetGroupArn: !Ref HTTPTargetGroup

  # IAM Managed Policies
  TaskExecutionLogsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} ECS task execution CloudWatch logs permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !GetAtt CollectorLogGroup.Arn
              - !Sub '${CollectorLogGroup.Arn}:*'

  TaskExecutionSSMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} ECS task execution SSM parameter read permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource:
              - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}-config'

  TaskMetricsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} ECS task CloudWatch metrics and logs permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: '*'
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:CreateLogGroup
              - logs:PutRetentionPolicy
            Resource:
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codex/metrics'
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codex/metrics:*'
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/litellm/metrics'
              - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/litellm/metrics:*'

  TaskSSMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} ECS task SSM parameter read permissions"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource:
              - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}-config'

  # IAM Roles
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - !Ref TaskExecutionLogsPolicy
        - !Ref TaskExecutionSSMPolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
          # Remove overly permissive trust policy that allowed any AWS account
      ManagedPolicyArns:
        - !Ref TaskMetricsPolicy
        - !Ref TaskSSMPolicy

  # SSM Parameter for Configuration
  OTelConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "${AWS::StackName}-config"
      Type: String
      Tier: Advanced
      Description: Custom OpenTelemetry configuration for Codex
      Value: !Sub |
        extensions:
          health_check:
            endpoint: 0.0.0.0:13133
            path: /

        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
                include_metadata: true
              http:
                endpoint: 0.0.0.0:4318
                include_metadata: true

        processors:
          batch/metrics:
            timeout: 60s
          # Extract HTTP headers to resource attributes
          # Note: Headers are normalized to lowercase in metadata
          attributes:
            actions:
              # Extract user information from headers
              - key: user.email
                from_context: metadata.x-user-email
                action: upsert
              - key: user.id
                from_context: metadata.x-user-id
                action: upsert
              - key: user.name
                from_context: metadata.x-user-name
                action: upsert
              # Extract team/organization information
              - key: department
                from_context: metadata.x-department
                action: upsert
              - key: team.id
                from_context: metadata.x-team-id
                action: upsert
              - key: cost_center
                from_context: metadata.x-cost-center
                action: upsert
              - key: organization
                from_context: metadata.x-organization
                action: upsert
              - key: location
                from_context: metadata.x-location
                action: upsert
              - key: role
                from_context: metadata.x-role
                action: upsert
              - key: manager
                from_context: metadata.x-manager
                action: upsert
          # Add AWS account ID to all metrics
          resource:
            attributes:
              - key: aws.account_id
                value: "${AWS::AccountId}"
                action: insert
              - key: deployment.environment
                value: "production"
                action: insert

        exporters:
          # Debug exporter for troubleshooting
          debug:
            verbosity: detailed
            sampling_initial: 10
            sampling_thereafter: 100

          # Accept but drop logs and traces until we have a concrete use case
          debug/sink:
            verbosity: basic

          # CloudWatch EMF (AWS OTEL Collector doesn't support native OTLP yet)
          awsemf:
            region: ${AWS::Region}
            namespace: ${MetricsNamespace}
            log_group_name: /aws/codex/metrics
            dimension_rollup_option: "ZeroAndSingleDimensionRollup"
            output_destination: cloudwatch
            resource_to_telemetry_conversion:
              enabled: true

        service:
          extensions: [health_check]
          telemetry:
            logs:
              level: info
              development: false
              encoding: json
              output_paths: [stdout]
          pipelines:
            metrics:
              receivers: [otlp]
              processors: [attributes, resource, batch/metrics]
              exporters: [debug, awsemf]
            logs:
              receivers: [otlp]
              exporters: [debug/sink]
            traces:
              receivers: [otlp]
              exporters: [debug/sink]

  # ECS Task Definition
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: aws-otel-collector
          Image: !Ref CollectorImage
          Essential: true
          Memory: 512
          Secrets:
            - Name: AOT_CONFIG_CONTENT
              ValueFrom: !Ref OTelConfig
          PortMappings:
            - ContainerPort: 4317
              Protocol: tcp
            - ContainerPort: 4318
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CollectorLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # ECS Service
  ECSService:
    Type: AWS::ECS::Service
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: EA022
            reason: ECS service health check grace period is explicitly set; cfnlint EA022 is a false positive for this pattern.
    DependsOn:
      - HTTPSListener
    Properties:
      ServiceName: !Sub "${AWS::StackName}-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref TaskSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: aws-otel-collector
          ContainerPort: 4318
          TargetGroupArn: !Ref HTTPTargetGroup
      HealthCheckGracePeriodSeconds: 60

  # Auto Scaling - Commented out due to service-linked role requirements
  # Uncomment if you want auto-scaling and have the necessary service-linked role
  #
  # ServiceScalingTarget:
  #   Type: AWS::ApplicationAutoScaling::ScalableTarget
  #   DependsOn: ECSService
  #   Properties:
  #     MaxCapacity: 3
  #     MinCapacity: 1
  #     ResourceId: !Sub 'service/${ECSCluster}/otel-collector-service'
  #     ScalableDimension: ecs:service:DesiredCount
  #     ServiceNamespace: ecs
  #
  # ServiceScalingPolicy:
  #   Type: AWS::ApplicationAutoScaling::ScalingPolicy
  #   Properties:
  #     PolicyName: otel-collector-cpu-scaling
  #     PolicyType: TargetTrackingScaling
  #     ScalingTargetId: !Ref ServiceScalingTarget
  #     TargetTrackingScalingPolicyConfiguration:
  #       PredefinedMetricSpecification:
  #         PredefinedMetricType: ECSServiceAverageCPUUtilization
  #       ScaleInCooldown: 60
  #       ScaleOutCooldown: 60
  #       TargetValue: 70

Outputs:
  VpcId:
    Description: VPC ID used
    Value: !Ref VpcId

  SubnetIds:
    Description: Subnet IDs used by the collector
    Value: !Join [',', !Ref SubnetIds]

  CollectorEndpoint:
    Description: Endpoint for OTLP metrics
    Value: !Sub 'https://${CustomDomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-endpoint'

  ALBEndpoint:
    Description: ALB DNS name
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-alb-dns'

  ConfigParameterName:
    Description: SSM Parameter containing collector configuration
    Value: !Ref OTelConfig

  LogGroupName:
    Description: CloudWatch Log Group for metrics
    Value: /aws/codex/metrics

  Note:
    Description: Important deployment information
    Value: !Sub |
      OTEL collector is available at: https://${CustomDomainName}
      Certificate validation is automatic via Route53.
      Codex settings will use this HTTPS endpoint.
