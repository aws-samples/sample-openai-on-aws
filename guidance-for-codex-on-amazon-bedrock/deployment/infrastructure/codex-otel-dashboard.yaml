AWSTemplateFormatVersion: '2010-09-09'
Description: 'Codex on Bedrock CloudWatch dashboard using native PromQL widgets over OTLP-ingested metrics.'

Parameters:
  DashboardName:
    Type: String
    Default: CodexOnBedrock
    Description: Name of the CloudWatch dashboard

  MetricsRegion:
    Type: String
    Default: us-west-2
    Description: Region where CloudWatch OTLP metrics are ingested

  # Pricing multipliers are USD per 1M tokens. Update to the current Bedrock
  # list price for the model you run with Codex. Defaults below are placeholders
  # and estimate order-of-magnitude spend only. Ground truth is CUR.
  InputTokenPriceUsdPerMillion:
    Type: Number
    Default: 0.15
    Description: USD per 1M input tokens

  OutputTokenPriceUsdPerMillion:
    Type: Number
    Default: 0.60
    Description: USD per 1M output tokens

  CachedInputTokenPriceUsdPerMillion:
    Type: Number
    Default: 0.075
    Description: USD per 1M cached-input tokens

Resources:
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": {
                "markdown": "# Codex on Bedrock - Usage & Adoption\n\nMetrics are emitted by Codex through OTLP and queried directly from CloudWatch with PromQL. Spend widgets are estimates from token counts; CUR remains the billing source of truth.",
                "background": "transparent"
              }
            },
            {
              "type": "chart",
              "x": 0, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Total Tokens",
                "view": "number",
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.turn.token_usage\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "Tokens" }] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 6, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Active Developers",
                "view": "number",
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "count(group by (\"user.id\")({\"codex.thread.started\", \"@resource.service.name\"=\"codex_cli_rs\"}))", "step": 60, "label": "Developers" }] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 12, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "API Requests",
                "view": "number",
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.api_request\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "Requests" }] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 18, "y": 2, "width": 6, "height": 4,
              "properties": {
                "title": "Error Rate",
                "view": "number",
                "region": "${MetricsRegion}",
                "data": { "queries": [{ "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.api_request\", success=\"false\", \"@resource.service.name\"=\"codex_cli_rs\"}) / sum({\"codex.api_request\", \"@resource.service.name\"=\"codex_cli_rs\"}) * 100", "step": 60, "label": "%" }] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "text",
              "x": 0, "y": 6, "width": 24, "height": 2,
              "properties": { "markdown": "## Token Usage", "background": "transparent" }
            },
            {
              "type": "chart",
              "x": 0, "y": 8, "width": 12, "height": 6,
              "properties": {
                "title": "Token Usage Over Time",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "total", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.turn.token_usage\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "Total" }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": true, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 12, "y": 8, "width": 12, "height": 6,
              "properties": {
                "title": "Token Usage by Type",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "input", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.turn.token_usage\", token_type=\"input\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "Input" },
                  { "id": "output", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.turn.token_usage\", token_type=\"output\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "Output" },
                  { "id": "cached", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.turn.token_usage\", token_type=\"cached_input\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "Cached Input" },
                  { "id": "reasoning", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum({\"codex.turn.token_usage\", token_type=\"reasoning_output\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "Reasoning Output" }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 0, "y": 14, "width": 12, "height": 6,
              "properties": {
                "title": "Token Usage by Model",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(50, sum by (model)({\"codex.turn.token_usage\", \"@resource.service.name\"=\"codex_cli_rs\"}))", "step": 60 }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": true, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 12, "y": 14, "width": 12, "height": 6,
              "properties": {
                "title": "Top Developers by Token Usage",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(50, sum by (\"user.id\")({\"codex.turn.token_usage\", \"@resource.service.name\"=\"codex_cli_rs\"}))", "step": 60 }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 0, "y": 20, "width": 12, "height": 6,
              "properties": {
                "title": "Estimated Spend by Developer",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(50, sum by (\"user.id\")({\"codex.turn.token_usage\", token_type=\"input\", \"@resource.service.name\"=\"codex_cli_rs\"}) * ${InputTokenPriceUsdPerMillion} / 1000000 + sum by (\"user.id\")({\"codex.turn.token_usage\", token_type=\"output\", \"@resource.service.name\"=\"codex_cli_rs\"}) * ${OutputTokenPriceUsdPerMillion} / 1000000 + sum by (\"user.id\")({\"codex.turn.token_usage\", token_type=\"cached_input\", \"@resource.service.name\"=\"codex_cli_rs\"}) * ${CachedInputTokenPriceUsdPerMillion} / 1000000)", "step": 60, "label": "USD estimate" }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 12, "y": 20, "width": 12, "height": 6,
              "properties": {
                "title": "Turn Duration p50 / p95",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "p50", "type": "cloudwatch-metrics", "language": "PromQL", "query": "quantile(0.50, {\"codex.turn.e2e_duration_ms\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "p50" },
                  { "id": "p95", "type": "cloudwatch-metrics", "language": "PromQL", "query": "quantile(0.95, {\"codex.turn.e2e_duration_ms\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60, "label": "p95" }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "text",
              "x": 0, "y": 26, "width": 24, "height": 2,
              "properties": { "markdown": "## Adoption and Reliability", "background": "transparent" }
            },
            {
              "type": "chart",
              "x": 0, "y": 28, "width": 8, "height": 6,
              "properties": {
                "title": "Session Source Mix",
                "view": "pie",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum by (session_source)({\"codex.thread.started\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60 }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": true, "stacked": true, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 8, "y": 28, "width": 8, "height": 6,
              "properties": {
                "title": "API Requests by Status",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "sum by (status)({\"codex.api_request\", \"@resource.service.name\"=\"codex_cli_rs\"})", "step": 60 }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            },
            {
              "type": "chart",
              "x": 16, "y": 28, "width": 8, "height": 6,
              "properties": {
                "title": "Tool Calls",
                "view": "line",
                "region": "${MetricsRegion}",
                "data": { "queries": [
                  { "id": "a", "type": "cloudwatch-metrics", "language": "PromQL", "query": "topk(20, sum by (tool_name)({\"codex.turn.tool.call\", \"@resource.service.name\"=\"codex_cli_rs\"}))", "step": 60 }
                ] },
                "plotOptions": { "legend": { "position": "bottom", "show": true }, "xAxis": { "type": "datetime" }, "yAxis": [{ "type": "linear" }], "style": { "lineOptions": { "filled": false, "stacked": false, "width": 2, "pattern": "solid", "spline": false }, "numberOptions": { "sparkline": true }, "pieOptions": { "innerSize": "50%" }, "barOptions": {}, "gaugeOptions": {} } }
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: Direct link to the dashboard in CloudWatch
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards/dashboard/${DashboardName}'
  DashboardName:
    Value: !Ref DashboardName
    Export:
      Name: !Sub '${AWS::StackName}-DashboardName'
