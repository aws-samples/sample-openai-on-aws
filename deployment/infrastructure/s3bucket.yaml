AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Bucket for CloudFormation artifacts (Lambda code packages)'

Resources:
  # S3 Bucket for CloudFormation artifacts (Lambda code packages)
  CfnArtifactsBucket:
    Type: AWS::S3::Bucket
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: This is the CloudFormation artifacts bucket; a dedicated logging bucket is not deployed with this stack.
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: This is the CloudFormation artifacts bucket; a dedicated logging bucket is not deployed with this stack.
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: 1
      AccessControl: Private
      LoggingConfiguration:
        LogFilePrefix: access-logs/
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: codex-cfn-artifacts
        - Key: Purpose
          Value: CloudFormation Lambda packaging

Outputs:
  CfnArtifactsBucket:
    Description: S3 bucket for CloudFormation artifacts
    Value: !Ref CfnArtifactsBucket
    Export:
      Name: !Sub "${AWS::StackName}-CfnArtifactsBucket"
