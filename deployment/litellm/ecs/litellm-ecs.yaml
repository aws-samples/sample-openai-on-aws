AWSTemplateFormatVersion: "2010-09-09"
Description: LiteLLM gateway on ECS Fargate - reuses existing networking and OTel collector stacks

Parameters:
  NetworkingStackName:
    Type: String
    Default: codex-test-networking
    Description: Name of the networking CloudFormation stack (exports VpcId and SubnetIds)

  OtelStackName:
    Type: String
    Default: codex-test-otel-collector
    Description: Name of the OTel collector stack (exports CollectorEndpoint). Ignored if EnableOtel=false.

  EnableOtel:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      When false (default), the gateway runs without OTel env vars and does NOT import
      the OTel collector endpoint export, so the OTel collector stack does not need to exist.
      Set to true only if you've separately deployed an OTel collector and want the
      gateway to forward traces to it.

  LiteLLMMasterKey:
    Type: String
    NoEcho: true
    Description: LiteLLM master key - stored in Secrets Manager

  BedrockMantleApiKey:
    Type: String
    NoEcho: true
    Description: >
      Bedrock Mantle API key for GPT-5.x and GPT-OSS models. Generate a short-term key
      (valid 12h) using: pip install aws-bedrock-token-generator &&
      python -c "from aws_bedrock_token_generator import provide_token; print(provide_token())"

  DBPassword:
    Type: String
    NoEcho: true
    Description: Password for the RDS PostgreSQL instance

  DBUsername:
    Type: String
    NoEcho: true
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9_]*"
    ConstraintDescription: Must begin with a letter and contain only letters, numbers, and underscores.
    Description: Username for the RDS PostgreSQL instance

  DBEngineVersion:
    Type: String
    Default: "17"
    AllowedValues: ["17"]
    Description: PostgreSQL major version for the RDS instance

  RDSMonitoringInterval:
    Type: Number
    Default: 60
    AllowedValues: [1, 5, 10, 15, 30, 60]
    Description: Enhanced monitoring interval in seconds for the RDS instance.

  AwsRegion:
    Type: String
    Default: us-east-1

  LiteLLMImage:
    Type: String
    AllowedPattern: ".+/.+:.+"
    ConstraintDescription: >
      Must be a fully-qualified image reference such as
      <account>.dkr.ecr.<region>.amazonaws.com/codex-litellm:<tag>.
    Description: >
      Required. Fully-qualified container image reference for the LiteLLM
      gateway. Build a custom image using deployment/litellm/Dockerfile
      (FROM ghcr.io/berriai/litellm:main-latest plus COPY litellm_config.yaml
      /app/config.yaml), push it to ECR, and pass the image URI here. The
      upstream ghcr.io/berriai/litellm image has no /app/config.yaml and will
      crash-loop on startup.

  AllowedCidr:
    Type: String
    Default: 10.0.0.0/8
    Description: >
      CIDR allowed to reach the ALB. Defaults to RFC1918 private network (10.0.0.0/8).
      For enterprise deployments, use your corporate network CIDR or VPN range.
      Do NOT use 0.0.0.0/0 - AWS security scans will auto-delete the listener.
      For public access, deploy AWS WAF with rate limiting and IP reputation filtering.

  AlbCertificateArn:
    Type: String
    AllowedPattern: ".+"
    ConstraintDescription: ACM certificate ARN is required for HTTPS.
    Description: ACM certificate ARN. The ALB listener uses HTTPS on port 443.

  AlbDomainName:
    Type: String
    Default: ""
    Description: Optional DNS name that resolves to the ALB and matches AlbCertificateArn. Used in the GatewayEndpoint output.

  # JWT Middleware Parameters (optional - for OIDC authentication)
  EnableJwtMiddleware:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      Enable JWT middleware for OIDC/SSO authentication.
      If false, uses standard API key authentication.

  JwtMiddlewareImage:
    Type: String
    Default: ""
    Description: >
      JWT middleware container image URI (required if EnableJwtMiddleware=true).
      Format: <account>.dkr.ecr.<region>.amazonaws.com/codex-jwt-middleware:latest

  JwksUrl:
    Type: String
    Default: ""
    Description: >
      JWKS URL from IdP (required if EnableJwtMiddleware=true).
      Example: https://your-tenant.okta.com/.well-known/jwks.json

  JwtAudience:
    Type: String
    Default: ""
    Description: >
      Expected JWT audience claim (optional).
      Leave empty to skip audience validation.

  JwtIssuer:
    Type: String
    Default: ""
    Description: >
      Expected JWT issuer claim (optional).
      Leave empty to skip issuer validation.

  UserKeyMappingStackName:
    Type: String
    Default: ""
    Description: >
      CloudFormation stack name for user-key-mapping DynamoDB table (required if EnableJwtMiddleware=true).
      Example: codex-user-key-mapping

Conditions:
  UseJwtMiddleware: !Equals [!Ref EnableJwtMiddleware, "true"]
  OtelEnabled: !Equals [!Ref EnableOtel, "true"]
  HasAlbDomainName: !Not [!Equals [!Ref AlbDomainName, ""]]

Resources:

  LiteLLMKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${AWS::StackName} LiteLLM logs and secrets key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableIAMPermissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowCloudWatchLogs
            Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.${AWS::URLSuffix}"
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: "*"
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"

  LiteLLMKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-litellm"
      TargetKeyId: !Ref LiteLLMKmsKey

  # --- Secrets ---

  LiteLLMSecret:
    Type: AWS::SecretsManager::Secret
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_108
            comment: Secret contains externally-supplied API keys and DB password provided as stack parameters; automated rotation requires application-specific Lambda not deployed here.
      cfn_nag:
        rules_to_suppress:
          - id: W77
            reason: Secret contains externally-supplied API keys and DB password provided as stack parameters; automated rotation requires application-specific Lambda not deployed here.
    Properties:
      Name: !Sub "${AWS::StackName}/litellm-secrets"
      KmsKeyId: !Ref LiteLLMKmsKey
      SecretString: !Sub '{"LITELLM_MASTER_KEY":"${LiteLLMMasterKey}","BEDROCK_MANTLE_API_KEY":"${BedrockMantleApiKey}"}'

  # --- IAM ---

  TaskExecutionSecretsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} ECS task execution secrets access"
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: !Ref LiteLLMSecret

  TaskBedrockAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: !Sub "${AWS::StackName} ECS task Bedrock access"
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            Resource: !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
          - Effect: Allow
            Action:
              - bedrock:CallWithBearerToken
            Resource: "*"
            Condition:
              StringEquals:
                aws:RequestedRegion: !Ref AwsRegion

  TaskDynamoDBAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: UseJwtMiddleware
    Properties:
      Description: !Sub "${AWS::StackName} ECS task DynamoDB access for JWT middleware"
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !Sub
              - "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}"
              - TableName: !ImportValue
                  Fn::Sub: "${UserKeyMappingStackName}-TableName"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
        - !Ref TaskExecutionSecretsPolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref TaskBedrockAccessPolicy
        - !If [UseJwtMiddleware, !Ref TaskDynamoDBAccessPolicy, !Ref AWS::NoValue]

  # --- Security Groups ---

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM ALB - restricted inbound
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedCidr
          Description: Allow ALB traffic from the configured CIDR
      SecurityGroupEgress: []

  ALBLogsBucket:
    Type: AWS::S3::Bucket
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: This bucket is the ALB access-log destination; recursive server access logging is intentionally not enabled.
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: This bucket is the ALB access-log destination; recursive server access logging is intentionally not enabled.
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteALBAccessLogs
            Status: Enabled
            ExpirationInDays: 90
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: GOVERNANCE
            Days: 1

  ALBLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowALBLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt ALBLogsBucket.Arn
          - Sid: AllowALBLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${ALBLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ALBLogsBucket.Arn
              - !Sub "${ALBLogsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM ECS task
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !If [UseJwtMiddleware, 8080, 4000]
          ToPort: !If [UseJwtMiddleware, 8080, 4000]
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow ALB traffic to the active service port
      SecurityGroupEgress: []

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F1000
            reason: "DB security group intentionally has no outbound rules; SecurityGroupEgress: [] removes default allow-all egress."
    Properties:
      GroupDescription: LiteLLM RDS - inbound from ECS task
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref TaskSecurityGroup
          Description: Allow PostgreSQL traffic from ECS tasks
      SecurityGroupEgress: []

  ALBToTaskEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: !If [UseJwtMiddleware, 8080, 4000]
      ToPort: !If [UseJwtMiddleware, 8080, 4000]
      DestinationSecurityGroupId: !Ref TaskSecurityGroup
      Description: Allow ALB to reach ECS tasks on the active service port

  TaskToDBEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref DBSecurityGroup
      Description: Allow ECS tasks to reach PostgreSQL

  TaskHttpsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref TaskSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: Allow ECS tasks to reach AWS APIs and external HTTPS endpoints

  # --- RDS ---

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: LiteLLM RDS subnets
      SubnetIds: !Split
        - ","
        - !ImportValue
          Fn::Sub: "${NetworkingStackName}-SubnetIds"

  RDSMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole"

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: litellm
      DBInstanceClass: db.t4g.micro
      Engine: postgres
      EngineVersion: !Ref DBEngineVersion
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: true
      MultiAZ: true
      MonitoringInterval: !Ref RDSMonitoringInterval
      MonitoringRoleArn: !GetAtt RDSMonitoringRole.Arn
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DeletionProtection: true
      BackupRetentionPeriod: 7
      AutoMinorVersionUpgrade: true

  # --- ECS ---

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      CapacityProviders: [FARGATE]

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}"
      KmsKeyId: !GetAtt LiteLLMKmsKey.Arn
      RetentionInDays: 30

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        # LiteLLM Gateway Container
        - Name: litellm
          Image: !Ref LiteLLMImage
          PortMappings:
            - ContainerPort: 4000
          Command: ["--config", "/app/config.yaml", "--port", "4000"]
          Environment:
            - Name: AWS_REGION
              Value: !Ref AwsRegion
            - Name: DATABASE_URL
              Value: !Sub "postgresql://${DBUsername}:${DBPassword}@${RDSInstance.Endpoint.Address}:5432/litellm"
            # LiteLLM OTEL configuration — only injected when OTel is enabled
            - !If
              - OtelEnabled
              - Name: OTEL_EXPORTER
                Value: otlp_http
              - !Ref AWS::NoValue
            - !If
              - OtelEnabled
              - Name: OTEL_ENDPOINT
                Value: !ImportValue
                  Fn::Sub: "${OtelStackName}-endpoint"
              - !Ref AWS::NoValue
            - !If
              - OtelEnabled
              - Name: OTEL_SERVICE_NAME
                Value: litellm-gateway
              - !Ref AWS::NoValue
            - !If
              - OtelEnabled
              - Name: LITELLM_OTEL_INTEGRATION_ENABLE_METRICS
                Value: "true"
              - !Ref AWS::NoValue
          Secrets:
            - Name: LITELLM_MASTER_KEY
              ValueFrom: !Sub "${LiteLLMSecret}:LITELLM_MASTER_KEY::"
            - Name: BEDROCK_MANTLE_API_KEY
              ValueFrom: !Sub "${LiteLLMSecret}:BEDROCK_MANTLE_API_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: litellm

        # JWT Middleware Container (conditional - only if EnableJwtMiddleware=true)
        - !If
          - UseJwtMiddleware
          - Name: jwt-middleware
            Image: !Ref JwtMiddlewareImage
            PortMappings:
              - ContainerPort: 8080
            Environment:
              - Name: JWKS_URL
                Value: !Ref JwksUrl
              - Name: JWT_AUDIENCE
                Value: !Ref JwtAudience
              - Name: JWT_ISSUER
                Value: !Ref JwtIssuer
              - Name: LITELLM_URL
                Value: "http://localhost:4000"
              - Name: AWS_REGION
                Value: !Ref AWS::Region
              - Name: DYNAMODB_TABLE
                Value: !ImportValue
                  Fn::Sub: "${UserKeyMappingStackName}-TableName"
            Secrets:
              - Name: LITELLM_MASTER_KEY
                ValueFrom: !Sub "${LiteLLMSecret}:LITELLM_MASTER_KEY::"
            DependsOn:
              - ContainerName: litellm
                Condition: START
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref LogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: jwt-middleware
          - !Ref AWS::NoValue

  # --- ALB ---

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: ALBLogsBucketPolicy
    Properties:
      Type: application
      Subnets: !Split
        - ","
        - !ImportValue
          Fn::Sub: "${NetworkingStackName}-SubnetIds"
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - Key: access_logs.s3.enabled
          Value: "true"
        - Key: access_logs.s3.bucket
          Value: !Ref ALBLogsBucket
        - Key: access_logs.s3.prefix
          Value: "alb"

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      Protocol: HTTP
      # If JWT middleware enabled, target port 8080, otherwise target LiteLLM directly on port 4000
      Port: !If [UseJwtMiddleware, 8080, 4000]
      TargetType: ip
      # If JWT middleware enabled, use /health, otherwise use LiteLLM's /health/liveliness
      HealthCheckPath: !If [UseJwtMiddleware, /health, /health/liveliness]

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AlbCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # --- ECS Service ---

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 2
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Split
            - ","
            - !ImportValue
              Fn::Sub: "${NetworkingStackName}-SubnetIds"
          SecurityGroups:
            - !Ref TaskSecurityGroup
          AssignPublicIp: ENABLED
      LoadBalancers:
        - ContainerName: !If [UseJwtMiddleware, jwt-middleware, litellm]
          ContainerPort: !If [UseJwtMiddleware, 8080, 4000]
          TargetGroupArn: !Ref ALBTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200

Outputs:
  GatewayEndpoint:
    Description: LiteLLM gateway URL - set as OPENAI_BASE_URL in Codex config
    Value: !If
      - HasAlbDomainName
      - !Sub "https://${AlbDomainName}/v1"
      - !Sub "https://${ALB.DNSName}/v1"
    Export:
      Name: !Sub "${AWS::StackName}-GatewayEndpoint"

  OtelEndpoint:
    Condition: OtelEnabled
    Description: OTel collector endpoint used by this deployment
    Value: !ImportValue
      Fn::Sub: "${OtelStackName}-endpoint"
