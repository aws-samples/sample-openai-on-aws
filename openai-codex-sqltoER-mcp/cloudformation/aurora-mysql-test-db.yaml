AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Workshop Aurora MySQL test database with generated master credentials, generated read-only credentials in Secrets Manager, and a Lambda-backed custom resource that creates the read-only database user.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the Aurora cluster and custom resource Lambda run.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two public subnets in different Availability Zones. Required
      because the Aurora instance is publicly accessible for this dev/test stack.

  PublicRouteTableIds:
    Type: CommaDelimitedList
    Description: Route tables used by the public subnets. Used to create an S3 VPC
      endpoint for CloudFormation custom resource responses.

  DatabaseName:
    Type: String
    Default: workshop
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9_]{0,63}$
    Description: Initial database name to create in the Aurora cluster.

  MasterUsername:
    Type: String
    Default: adminuser
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9_]{0,31}$
    Description: Master database username. Password is generated by RDS.

  ReadOnlyUsername:
    Type: String
    Default: readonly_user
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9_]{0,31}$
    Description: Read-only database username to create.

  DesktopEgressPoolCidr:
    Type: String
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}0\/24$
    Description: Desktop external IPv4 egress pool allowed to connect to Aurora
      MySQL. Required. Use your actual public /24 egress pool; a /24 may include
      other tenants behind a shared NAT.

  DbInstanceClass:
    Type: String
    Default: db.t4g.medium
    AllowedValues:
      - db.t4g.medium
      - db.t4g.large
      - db.r6g.large
    Description: Aurora DB instance class.

  AuroraMysqlEngineVersion:
    Type: String
    Default: 8.0.mysql_aurora.3.08.2
    Description: Aurora MySQL engine version. Adjust if this version is unavailable
      in your region.

  PyMySQLLayerArn:
    Type: String
    Description: ARN of a Lambda layer containing PyMySQL for Python 3.12.

  S3GatewayPrefixListId:
    Type: String
    AllowedPattern: ^pl-[a-zA-Z0-9]+$
    Description: AWS-managed S3 prefix list ID for this region, used to allow Lambda
      custom resource responses through the S3 gateway endpoint.

  ReadOnlyGrantScope:
    Type: String
    Default: InitialDatabase
    AllowedValues:
      - InitialDatabase
      - AllDatabases
    Description: Scope for read-only grants. Use InitialDatabase for least privilege
      or AllDatabases when the ER diagram agent must inspect every schema.

  DeletionProtectionEnabled:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable Aurora deletion protection. Defaults to false for this
      dev/test stack so cleanup can complete.

Resources:
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for the workshop Aurora MySQL cluster.
      SubnetIds: !Ref PublicSubnetIds

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora MySQL access for the workshop database.
      VpcId: !Ref VpcId
      SecurityGroupEgress: []

  DbIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow the custom resource Lambda to configure the database.
      GroupId: !Ref DbSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref LambdaSecurityGroup

  DbIngressFromDesktop:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow MySQL access from the configured desktop egress pool.
      GroupId: !Ref DbSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      CidrIp: !Ref DesktopEgressPoolCidr

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda access to Aurora MySQL and Secrets Manager endpoint.
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          DestinationSecurityGroupId: !Ref DbSecurityGroup

  LambdaEgressToSecretsManagerEndpoint:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !Ref LambdaSecurityGroup

  LambdaEgressToS3GatewayEndpoint:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref LambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationPrefixListId: !Ref S3GatewayPrefixListId

  LambdaSecurityGroupSelfIngressHttps:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref LambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref LambdaSecurityGroup

  SecretsManagerVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcId: !Ref VpcId
      SubnetIds: !Ref PublicSubnetIds
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt CustomResourceRole.Arn
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Ref MasterSecret
              - !Ref ReadOnlySecret

  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Gateway
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcId: !Ref VpcId
      RouteTableIds: !Ref PublicRouteTableIds
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:PutObject
            Resource:
              - !Sub arn:${AWS::Partition}:s3:::cloudformation-custom-resource-response-${AWS::Region}/*
              - !Sub
                - arn:${AWS::Partition}:s3:::cloudformation-custom-resource-response-${RegionNoHyphens}/*
                - RegionNoHyphens: !Join
                    - ''
                    - !Split
                      - '-'
                      - !Ref AWS::Region

  MasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Generated Aurora MySQL master credentials for the workshop database.
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${MasterUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  ReadOnlySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Generated read-only Aurora MySQL credentials for schema inspection.
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${ReadOnlyUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  DbClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Requires encrypted client connections for the workshop Aurora MySQL
        cluster.
      Family: aurora-mysql8.0
      Parameters:
        require_secure_transport: 'ON'

  DbCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-mysql
      EngineVersion: !Ref AuroraMysqlEngineVersion
      DatabaseName: !Ref DatabaseName
      DBSubnetGroupName: !Ref DbSubnetGroup
      DBClusterParameterGroupName: !Ref DbClusterParameterGroup
      VpcSecurityGroupIds:
        - !Ref DbSecurityGroup
      MasterUsername: !Sub '{{resolve:secretsmanager:${MasterSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${MasterSecret}:SecretString:password}}'
      BackupRetentionPeriod: 7
      DeletionProtection: !Ref DeletionProtectionEnabled
      StorageEncrypted: true

  DbInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DbCluster
      DBInstanceClass: !Ref DbInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: true

  CustomResourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ReadWorkshopSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref MasterSecret
                  - !Ref ReadOnlySecret

  ReadOnlyUserFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Creates and updates the Aurora MySQL read-only user for the
        workshop database.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CustomResourceRole.Arn
      Timeout: 60
      Layers:
        - !Ref PyMySQLLayerArn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref PublicSubnetIds
      Environment:
        Variables:
          DB_HOST: !GetAtt DbCluster.Endpoint.Address
          DB_PORT: !GetAtt DbCluster.Endpoint.Port
          MASTER_SECRET_ARN: !Ref MasterSecret
          READ_ONLY_SECRET_ARN: !Ref ReadOnlySecret
          DATABASE_NAME: !Ref DatabaseName
          READ_ONLY_GRANT_SCOPE: !Ref ReadOnlyGrantScope
      Code:
        ZipFile: |
          import json
          import logging
          import os
          import urllib.request

          import boto3
          import pymysql

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          secrets = boto3.client("secretsmanager")

          def log(message, **fields):
              logger.info("%s %s", message, json.dumps(fields, sort_keys=True))

          def respond(event, context, status, data=None, physical_id=None, reason=None):
              body = {
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Logs: {context.log_stream_name}",
                  "PhysicalResourceId": physical_id or event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "NoEcho": False,
                  "Data": data or {},
              }
              log(
                  "Sending CloudFormation custom resource response.",
                  status=status,
                  logical_resource_id=event["LogicalResourceId"],
                  physical_resource_id=body["PhysicalResourceId"],
              )
              request = urllib.request.Request(
                  event["ResponseURL"],
                  data=json.dumps(body).encode("utf-8"),
                  method="PUT",
                  headers={"Content-Type": "application/json"},
              )
              with urllib.request.urlopen(request, timeout=10) as response:
                  response.read()
              log("CloudFormation custom resource response sent.", status=status)

          def get_secret(secret_arn):
              value = secrets.get_secret_value(SecretId=secret_arn)
              return json.loads(value["SecretString"])

          def handler(event, context):
              connection = None
              try:
                  request_type = event["RequestType"]
                  log(
                      "Handling read-only user custom resource request.",
                      request_type=request_type,
                      logical_resource_id=event["LogicalResourceId"],
                      request_id=event["RequestId"],
                  )
                  master = get_secret(os.environ["MASTER_SECRET_ARN"])
                  readonly = get_secret(os.environ["READ_ONLY_SECRET_ARN"])
                  readonly_username = readonly["username"]
                  readonly_password = readonly["password"]
                  database_name = os.environ["DATABASE_NAME"]
                  grant_scope = os.environ["READ_ONLY_GRANT_SCOPE"]
                  old_readonly_username = event.get("OldResourceProperties", {}).get("ReadOnlyUsername")
                  log(
                      "Loaded database user configuration.",
                      database_name=database_name,
                      grant_scope=grant_scope,
                      readonly_username=readonly_username,
                  )

                  connection = pymysql.connect(
                      host=os.environ["DB_HOST"],
                      port=int(os.environ["DB_PORT"]),
                      user=master["username"],
                      password=master["password"],
                      connect_timeout=10,
                      autocommit=True,
                      ssl_ca="/etc/pki/tls/certs/ca-bundle.crt",
                      ssl_verify_cert=True,
                      ssl_verify_identity=True,
                  )
                  log(
                      "Connected to Aurora MySQL.",
                      database_host=os.environ["DB_HOST"],
                      database_port=os.environ["DB_PORT"],
                  )

                  with connection.cursor() as cursor:
                      # These DDL/DCL statements are built from constrained values:
                      # the template validates usernames/database names and the generated
                      # secret excludes characters that would weaken this escaping.
                      # Keep those constraints in place if this block is modified later.
                      escaped_user = readonly_username.replace("'", "''")
                      escaped_password = readonly_password.replace("'", "''")
                      escaped_database = database_name.replace("`", "``")
                      if old_readonly_username and old_readonly_username != readonly_username:
                          escaped_old_user = old_readonly_username.replace("'", "''")
                          log("Dropping previous read-only user.", old_readonly_username=old_readonly_username)
                          cursor.execute(f"DROP USER IF EXISTS '{escaped_old_user}'@'%'")

                      if request_type == "Delete":
                          log("Dropping read-only user for delete request.", readonly_username=readonly_username)
                          cursor.execute(f"DROP USER IF EXISTS '{escaped_user}'@'%'")
                          respond(event, context, "SUCCESS", {"Message": "Read-only user dropped."})
                          return

                      log("Creating ER diagram test tables.", database_name=database_name)
                      cursor.execute(
                          f"""
                          CREATE TABLE IF NOT EXISTS `{escaped_database}`.`teams` (
                              team_id BIGINT NOT NULL AUTO_INCREMENT,
                              team_name VARCHAR(128) NOT NULL,
                              created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
                              PRIMARY KEY (team_id),
                              UNIQUE KEY uk_teams_team_name (team_name)
                          ) ENGINE=InnoDB
                          """
                      )
                      cursor.execute(
                          f"""
                          CREATE TABLE IF NOT EXISTS `{escaped_database}`.`applications` (
                              application_id BIGINT NOT NULL AUTO_INCREMENT,
                              team_id BIGINT NOT NULL,
                              application_name VARCHAR(128) NOT NULL,
                              created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
                              PRIMARY KEY (application_id),
                              UNIQUE KEY uk_applications_team_name (team_id, application_name),
                              CONSTRAINT fk_applications_team
                                  FOREIGN KEY (team_id)
                                  REFERENCES `{escaped_database}`.`teams` (team_id)
                                  ON UPDATE CASCADE
                                  ON DELETE RESTRICT
                          ) ENGINE=InnoDB
                          """
                      )
                      cursor.execute(
                          f"""
                          CREATE TABLE IF NOT EXISTS `{escaped_database}`.`deployments` (
                              deployment_id BIGINT NOT NULL AUTO_INCREMENT,
                              application_id BIGINT NOT NULL,
                              environment_name VARCHAR(64) NOT NULL,
                              deployed_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
                              PRIMARY KEY (deployment_id),
                              KEY idx_deployments_application_id (application_id),
                              CONSTRAINT fk_deployments_application
                                  FOREIGN KEY (application_id)
                                  REFERENCES `{escaped_database}`.`applications` (application_id)
                                  ON UPDATE CASCADE
                                  ON DELETE CASCADE
                          ) ENGINE=InnoDB
                          """
                      )

                      log("Creating or updating read-only user.", readonly_username=readonly_username)
                      cursor.execute(
                          f"CREATE USER IF NOT EXISTS '{escaped_user}'@'%' IDENTIFIED BY '{escaped_password}'"
                      )
                      cursor.execute(
                          f"ALTER USER '{escaped_user}'@'%' IDENTIFIED BY '{escaped_password}'"
                      )
                      cursor.execute(f"REVOKE ALL PRIVILEGES, GRANT OPTION FROM '{escaped_user}'@'%'")
                      if grant_scope == "AllDatabases":
                          log("Granting read-only access across all databases.", readonly_username=readonly_username)
                          cursor.execute(f"GRANT SELECT, SHOW VIEW ON *.* TO '{escaped_user}'@'%'")
                      else:
                          log(
                              "Granting read-only access to initial database.",
                              readonly_username=readonly_username,
                              database_name=database_name,
                          )
                          cursor.execute(
                              f"GRANT SELECT, SHOW VIEW ON `{escaped_database}`.* TO '{escaped_user}'@'%'"
                          )
                      cursor.execute("FLUSH PRIVILEGES")

                  log("Read-only user configuration completed.", readonly_username=readonly_username)
                  respond(
                      event,
                      context,
                      "SUCCESS",
                      {"ReadOnlyUsername": readonly_username},
                      physical_id=f"readonly-user-{readonly_username}",
                  )
              except Exception as exc:
                  logger.exception("Failed to configure the read-only database user.")
                  try:
                      respond(event, context, "FAILED", reason=str(exc))
                  except Exception:
                      logger.exception("Failed to send CloudFormation failure response.")
                      raise
              finally:
                  if connection:
                      connection.close()

  ReadOnlyUserLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ReadOnlyUserFunction}
      RetentionInDays: 14

  CreateReadOnlyUser:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - DbInstance
      - DbIngressFromLambda
      - LambdaEgressToSecretsManagerEndpoint
      - LambdaEgressToS3GatewayEndpoint
      - ReadOnlyUserLogGroup
      - SecretsManagerVpcEndpoint
      - S3VpcEndpoint
    Properties:
      ServiceToken: !GetAtt ReadOnlyUserFunction.Arn
      ReadOnlyUsername: !Ref ReadOnlyUsername
      GrantScope: !Ref ReadOnlyGrantScope
      SchemaBootstrapVersion: test-tables-v1

Outputs:
  DbClusterEndpoint:
    Description: Aurora MySQL writer endpoint.
    Value: !GetAtt DbCluster.Endpoint.Address

  DbClusterPort:
    Description: Aurora MySQL port.
    Value: !GetAtt DbCluster.Endpoint.Port

  DatabaseName:
    Description: Initial database name.
    Value: !Ref DatabaseName

  MasterSecretArn:
    Description: Secrets Manager ARN for master DB credentials.
    Value: !Ref MasterSecret

  ReadOnlySecretArn:
    Description: Secrets Manager ARN for read-only DB credentials.
    Value: !Ref ReadOnlySecret
